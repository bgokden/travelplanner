name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install (everything -- no optional extras)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Lint (pyflakes -- no unused imports or dead code)
        run: python -m pyflakes travelplanner bench examples tests
      - name: Run all tests (no skips allowed)
        shell: bash
        run: |
          set -euo pipefail
          pytest -q -rs | tee /tmp/pytest.out
          if grep -qE '[0-9]+ skipped' /tmp/pytest.out; then
            echo "::error::tests were skipped -- every dependency is core, nothing should skip"
            exit 1
          fi
      - name: Smoke + latency bench
        run: python bench/api_smoke.py
